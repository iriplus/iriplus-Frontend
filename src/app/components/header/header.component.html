<header class="header-container">
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">

      <!-- Logo -->
      <a class="navbar-brand brand-logo" [routerLink]="isAuthenticated ? '/home' : '/'">
        <img src="assets/logo.png" alt="IRI+ logo" class="logo-img" />
      </a>

      <!-- Toggle -->
      <button
        class="navbar-toggler custom-toggler"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasNavbar"
        aria-controls="offcanvasNavbar"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Offcanvas real -->
      <div
        class="offcanvas offcanvas-start custom-offcanvas"
        tabindex="-1"
        id="offcanvasNavbar"
        aria-labelledby="offcanvasNavbarLabel"
      >
        <div class="offcanvas-header">
          <h5 class="offcanvas-title brand-title" id="offcanvasNavbarLabel">IRI+</h5>
          <button
            type="button"
            class="btn-close custom-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>

        <div class="offcanvas-body nav-body">

          <!-- NAV LINKS (solo autenticado) -->
          <ul class="navbar-nav nav-links" *ngIf="isAuthenticated">
            <li class="nav-item">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/home')">
                Home
              </button>
            </li>

            <li class="nav-item">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/exam')">
                Exams
              </button>
            </li>

            <li class="nav-item" *ngIf="isCoordinator">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/exercise')">
                Exercises
              </button>
            </li>

            <li class="nav-item" *ngIf="isStudent">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/writing-review')">
                Writing
              </button>
            </li>

            <li class="nav-item" *ngIf="isCoordinator">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/teachers')">
                Teachers
              </button>
            </li>

            <li class="nav-item" *ngIf="isCoordinator || isTeacher">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/students')">
                Students
              </button>
            </li>

            <li class="nav-item" *ngIf="isCoordinator || isTeacher">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/classes')">
                Classes
              </button>
            </li>

            <li class="nav-item" *ngIf="isCoordinator">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/levels')">
                Levels
              </button>
            </li>

            <li class="nav-item" *ngIf="isCoordinator">
              <button type="button" class="nav-link nav-link-btn" (click)="goTo('/tuitions')">
                Tuitions
              </button>
            </li>
          </ul>

          <!-- Actions (solo NO autenticado) -->
          <div class="header-auth-actions" *ngIf="!isAuthenticated">
            <button type="button" class="btn-ghost header-btn-ghost" (click)="goTo('/login')">
              Sign in
            </button>
            <button type="button" class="btn-primary header-btn-primary" (click)="goTo('/register')">
              Create account
            </button>
          </div>

          <!-- User dropdown (solo autenticado) -->
          <div class="dropdown" *ngIf="isAuthenticated">
            <button
              class="dropdown-toggle header-user-btn"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              aria-label="Open user menu"
            >
              <i class="bi bi-person"></i>
            </button>

            <ul class="dropdown-menu dropdown-menu-end header-dropdown-menu">
              <li>
                <button type="button" class="dropdown-item" (click)="goTo('/my-profile')">
                  <i class="bi bi-person-gear"></i>
                  <span>My Profile</span>
                </button>
              </li>
              <li>
                <button type="button" class="dropdown-item" (click)="openLogoutConfirm()">
                  <i class="bi bi-box-arrow-right"></i>
                  <span>Log Out</span>
                </button>
              </li>
            </ul>
          </div>

        </div>
      </div>
    </div>
  </nav>
</header>
<app-confirm-dialog
  [open]="confirmDialog.open"
  [title]="confirmDialog.title"
  [message]="confirmDialog.message"
  [confirmText]="confirmDialog.confirmText"
  [cancelText]="confirmDialog.cancelText"
  [variant]="confirmDialog.variant"
  (confirmed)="handleConfirm()"
  (cancelled)="closeConfirmDialog()"
></app-confirm-dialog>
