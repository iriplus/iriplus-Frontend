<form class="teacher-form" (ngSubmit)="submit()">

  <!-- Name + Surname -->
  <div class="teacher-form__grid">
    <div class="teacher-form__group">
      <label class="teacher-form__label" for="teacher-name">First Name</label>
      <div class="teacher-form__field">
        <svg class="teacher-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <input
          id="teacher-name"
          type="text"
          name="name"
          [(ngModel)]="formData.name"
          class="app-input app-input--icon-left"
          placeholder="First name"
          required
        />
      </div>
    </div>

    <div class="teacher-form__group">
      <label class="teacher-form__label" for="teacher-surname">Last Name</label>
      <div class="teacher-form__field">
        <svg class="teacher-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <input
          id="teacher-surname"
          type="text"
          name="surname"
          [(ngModel)]="formData.surname"
          class="app-input app-input--icon-left"
          placeholder="Last name"
          required
        />
      </div>
    </div>
  </div>

  <!-- Email + DNI -->
  <div class="teacher-form__grid">
    <div class="teacher-form__group">
      <label class="teacher-form__label" for="teacher-email">Email Address</label>
      <div class="teacher-form__field">
        <svg class="teacher-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        <input
          id="teacher-email"
          type="email"
          name="email"
          [(ngModel)]="formData.email"
          class="app-input app-input--icon-left"
          placeholder="you@example.com"
          required
        />
      </div>
    </div>

    <div class="teacher-form__group">
      <label class="teacher-form__label" for="teacher-dni">DNI</label>
      <div class="teacher-form__field">
        <svg class="teacher-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="16" rx="2"></rect>
          <line x1="7" y1="8" x2="17" y2="8"></line>
        </svg>
        <input
          id="teacher-dni"
          type="text"
          name="dni"
          [(ngModel)]="formData.dni"
          class="app-input app-input--icon-left"
          placeholder="DNI"
          required
        />
      </div>
    </div>
  </div>

  <!-- Passwords -->
  <div class="teacher-form__grid">
    <div class="teacher-form__group">
      <label class="teacher-form__label" for="teacher-password">Password</label>
      <div class="teacher-form__field">
        <svg class="teacher-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <input
          id="teacher-password"
          [type]="showPasswd ? 'text' : 'password'"
          name="password"
          [(ngModel)]="formData.passwd"
          class="app-input app-input--icon-left"
          placeholder="At least 8 characters"
          required
        />
      </div>
    </div>

    <div class="teacher-form__group">
      <label class="teacher-form__label" for="teacher-confirm-password">Confirm Password</label>
      <div class="teacher-form__field">
        <svg class="teacher-form__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <input
          id="teacher-confirm-password"
          [type]="showConfirmPasswd ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          class="app-input app-input--icon-left"
          placeholder="Repeat password"
          required
        />
      </div>
    </div>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="app-error teacher-form__error">
    {{ errorMessage }}
  </div>

  <!-- Submit -->
  <button
    type="submit"
    class="btn-primary btn-lg btn-with-spinner teacher-form__submit"
    [class.btn-loading]="isLoading"
  >
    <span *ngIf="isLoading" class="app-spinner"></span>
    <span>{{ isLoading ? 'Creating...' : 'Create Teacher' }}</span>
  </button>

</form>
